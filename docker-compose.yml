version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fraud_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_api_server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - MONGODB_URL=mongodb://mongodb:27017/fraud_detection
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

volumes:
  mongo_data:
